<!DOCTYPE html>
<html>

<head>
    <base href="/upserv-web-public/">

    <meta charset="UTF-8" />
    <meta content="IE=Edge" http-equiv="X-UA-Compatible" />
    <meta name="description" content="A Barterly Product." />

    <!-- iOS meta tags & icons -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Upserv" />
    <link rel="apple-touch-icon" href="icons/Icon-192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png" />

    <title>Upserv</title>
    <link rel="manifest" href="manifest.json" />

    <script>
        // The value below is injected by flutter build, do not touch.
        var serviceWorkerVersion = '"1234572464"';
    </script>
</head>

<body>
    <!-- Direct script injection since flutter.js is absent from project -->
    <script src="main.dart.js" type="application/javascript"></script>
    <script>
      window.addEventListener('load', function(ev) {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('flutter_service_worker.js?v=' + serviceWorkerVersion);
        }
      });
    </script>
</body>

</html>
